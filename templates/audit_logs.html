{% extends "base.html" %}

{% block title %}Audit Logs{% endblock %}

{% block content %}
<h2 style="text-align: center; color: #333;">📋 Audit Logs</h2>

<div style="max-width: 900px; margin: 2rem auto; background-color: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1);">

    <table style="width: 100%; border-collapse: collapse;">
        <thead>
            <tr style="background-color: #f2f2f2;">
                <th style="border: 1px solid #ccc; padding: 0.75rem;">Username</th>
                <th style="border: 1px solid #ccc; padding: 0.75rem;">Action</th>
                <th style="border: 1px solid #ccc; padding: 0.75rem;">Status</th>
                <th style="border: 1px solid #ccc; padding: 0.75rem;">IP Address</th>
                <th style="border: 1px solid #ccc; padding: 0.75rem;">Timestamp</th>
            </tr>
        </thead>

        <tbody>
            {% for log in logs %}
            <tr>
                <td style="border: 1px solid #ccc; padding: 0.75rem;">{{ log.username }}</td>
                <td style="border: 1px solid #ccc; padding: 0.75rem;">{{ log.action }}</td>
                <td style="border: 1px solid #ccc; padding: 0.75rem;">{{ log.status }}</td>
                <td style="border: 1px solid #ccc; padding: 0.75rem;">{{ log.ip_address }}</td>
                <td style="border: 1px solid #ccc; padding: 0.75rem;">{{ log.timestamp }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>
{% endblock %}
