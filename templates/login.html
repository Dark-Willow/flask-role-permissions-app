{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<h2 style="text-align: center; color: #333; margin-top: 1rem;">
    🔐 Login to Your Account
</h2>

<div style="
    max-width: 400px;
    margin: 2rem auto;
    background-color: #ffffff;
    padding: 2rem;
    border-radius: 8px;
    box-shadow: 0 0 12px rgba(0, 0, 0, 0.12);
">

    <form method="POST" action="{{ url_for('login') }}">

        <div style="margin-bottom: 1rem;">
            <label for="username" style="
                display: block;
                font-weight: bold;
                margin-bottom: 0.5rem;
                color: #333;
            ">
                Username
            </label>

            <input
                type="text"
                id="username"
                name="username"
                placeholder="Enter your username"
                required
                style="
                    width: 100%;
                    padding: 0.65rem;
                    border: 1px solid #ccc;
                    border-radius: 4px;
                    box-sizing: border-box;
                "
            >
        </div>

        <div style="margin-bottom: 1.5rem;">
            <label for="password" style="
                display: block;
                font-weight: bold;
                margin-bottom: 0.5rem;
                color: #333;
            ">
                Password
            </label>

            <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                required
                style="
                    width: 100%;
                    padding: 0.65rem;
                    border: 1px solid #ccc;
                    border-radius: 4px;
                    box-sizing: border-box;
                "
            >
        </div>

        <button
            type="submit"
            style="
                width: 100%;
                padding: 0.75rem;
                background-color: #007bff;
                color: white;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                font-size: 1rem;
            "
        >
            🚀 Log In
        </button>

    </form>

</div>

{% endblock %}
